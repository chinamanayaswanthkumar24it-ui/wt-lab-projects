<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Inline CSS Example</title>
</head>
<body style="background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; margin: 0;">

    <div style="background-color: #ffffff; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        
        <h1 style="color: #2c3e50; text-align: center; margin-bottom: 20px;">Welcome to My Page</h1>
        
        <p style="color: #555555; font-size: 16px; line-height: 1.6; text-align: justify;">
            This is a simple paragraph. Every style you see here—the background color, the font layout, and the spacing—is handled using <strong>inline CSS</strong>. It is quick and convenient for quick fixes.
        </p>

        <div style="background-color: #3498db; color: #ffffff; padding: 15px; border-radius: 5px; text-align: center; font-weight: bold; margin-top: 25px;">
            This box has a blue background, white text, and rounded corners!
        </div>

    </div>

</body>
</html>
