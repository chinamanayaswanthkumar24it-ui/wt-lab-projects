 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS Example</title>
    
    <style>
        /* Styles the entire page background and font */
        body {
            background-color: #f3e5f5; /* Light purple */
            font-family: 'Courier New', Courier, monospace;
            padding: 50px;
            margin: 0;
        }

        /* Styles the central white box */
        .box {
            background-color: #ffffff;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            text-align: center;
        }

        /* Styles the heading inside the box */
        h1 {
            color: #6a1b9a; /* Dark purple */
            margin-top: 0;
        }

        /* Styles the description text */
        p {
            color: #4a148c;
            font-size: 16px;
            line-height: 1.6;
        }
    </style>
    </head>
<body>

    <div class="box">
        <h1>Internal CSS</h1>
        <p>
            All the design rules for this page live right up there in the <code>&lt;style&gt;</code> tag. This keeps the layout structured and separates the content from the design while keeping everything in a single file.
        </p>
    </div>

</body>
</html>
